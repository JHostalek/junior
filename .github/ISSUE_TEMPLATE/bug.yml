name: Bug Report
description: Report an issue
labels: [bug]
body:
  - type: textarea
    id: describe
    attributes:
      label: Describe the bug
      description: What happened? What did you expect instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Steps or command snippet to reproduce the issue.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `junior --version`
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else relevant.
